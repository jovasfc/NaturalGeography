<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然地理演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 60px 20px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.9), transparent),
                radial-gradient(1px 1px at 230px 80px, #fff, transparent),
                radial-gradient(2px 2px at 300px 150px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 350px 60px, #fff, transparent),
                radial-gradient(2px 2px at 420px 180px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 500px 90px, #fff, transparent),
                radial-gradient(2px 2px at 580px 130px, rgba(255,255,255,0.9), transparent);
            background-repeat: repeat;
            background-size: 600px 200px;
            animation: twinkle 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 15px;
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.6);
            margin-bottom: 50px;
            font-size: 1rem;
            letter-spacing: 3px;
        }
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            list-style: none;
        }
        .link-item a {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px 30px;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 400;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .link-item a::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }
        .link-item a:hover::before {
            left: 100%;
        }
        .link-item a:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-right: 20px;
            flex-shrink: 0;
        }
        .link-item:nth-child(1) .icon { background: linear-gradient(135deg, #667eea, #764ba2); }
        .link-item:nth-child(2) .icon { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .link-item:nth-child(3) .icon { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .link-item:nth-child(4) .icon { background: linear-gradient(135deg, #fa709a, #fee140); }
        .link-item:nth-child(5) .icon { background: linear-gradient(135deg, #a8edea, #fed6e3); }
        .text {
            display: flex;
            flex-direction: column;
        }
        .title {
            font-weight: 500;
            margin-bottom: 5px;
        }
        .desc {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }
        .footer {
            text-align: center;
            margin-top: 60px;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>自然地理演示动画</h1>
        <p class="subtitle">Interactive Demonstrations</p>
        <ul class="link-grid">
            <li class="link-item">
                <a href="三圈环流季节变化版.html">
                    <div class="icon">🌀</div>
                    <div class="text">
                        <span class="title">三圈环流</span>
                        <span class="desc">大气环流季节性变化演示</span>
                    </div>
                </a>
            </li>
            <li class="link-item">
                <a href="三圈环流早期版本.html">
                    <div class="icon">💨</div>
                    <div class="text">
                        <span class="title">三圈环流早期版本</span>
                        <span class="desc">基础大气环流模型</span>
                    </div>
                </a>
            </li>
            <li class="link-item">
                <a href="地球公转.html">
                    <div class="icon">🌍</div>
                    <div class="text">
                        <span class="title">地球公转</span>
                        <span class="desc">地球绕日运动演示</span>
                    </div>
                </a>
            </li>
            <li class="link-item">
                <a href="太阳、月球视运动及潮汐.html">
                    <div class="icon">🌙</div>
                    <div class="text">
                        <span class="title">太阳、月球及潮汐</span>
                        <span class="desc">天体运动与潮汐现象</span>
                    </div>
                </a>
            </li>
            <li class="link-item">
                <a href="热力环流与气旋.html">
                    <div class="icon">🌡️</div>
                    <div class="text">
                        <span class="title">热力环流与气旋</span>
                        <span class="desc">热力环流与气旋形成</span>
                    </div>
                </a>
            </li>
        </ul>
        <p class="footer">Natural Geography Interactive Demonstrations</p>
    </div>
</body>
</html>
