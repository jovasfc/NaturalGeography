      moonGlow.scale.set(size * 4, size * 4, 1);
    });

    document.getElementById('btn-mark-dec').addEventListener('click', function() {
      addMarkedDec(solarDeclination);
    });

    document.getElementById('btn-clear-marks').addEventListener('click', function() {
      clearMarkedDecs();
    });

    // ==================== 地面标记点 ====================
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function onEarthClick(event) {
      // 计算鼠标位置归一化坐标
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, useOrtho ? orthoCamera : camera);

      // 与地球求交
      const intersects = raycaster.intersectObject(earthMesh);
      if (intersects.length > 0) {
        const pt = intersects[0].point;
        // 转换到 earthRotateGroup 局部空间
        const localPt = earthRotateGroup.worldToLocal(pt.clone());
        const { lat, lng } = positionToLatLng(localPt);
        addMarker(lat, lng);
      }
    }

    renderer.domElement.addEventListener('dblclick', onEarthClick);

    document.getElementById('btn-add-marker').addEventListener('click', function() {
      const lat = parseFloat(document.getElementById('input-lat').value);
      const lng = parseFloat(document.getElementById('input-lng').value);
      if (isNaN(lat) || isNaN(lng)) return;
      addMarker(Math.max(-90, Math.min(90, lat)), lng);
    });

    document.getElementById('btn-clear-markers').addEventListener('click', function() {
      clearMarkers();
    });

    document.getElementById('btn-horizon').addEventListener('click', function() {
      showHorizon = !showHorizon;
      this.classList.toggle('active');
      for (const m of markers) {
        if (m.horizonGroup) m.horizonGroup.visible = showHorizon;
      }
      // 更新赤纬圈裁剪平面
      updateDecClipPlane();
    });

    document.getElementById('slider-horizon-opacity').addEventListener('input', function() {
      const val = parseFloat(this.value);
      document.getElementById('horizon-opacity-val').textContent = val.toFixed(2);
      updateHorizonOpacity(val);
    });

    // 正射投影切换按钮（动态创建）
    const orthoBtn = document.createElement('button');
    orthoBtn.className = 'toggle-btn active';
    orthoBtn.textContent = '📐 正射投影';
    orthoBtn.style.cssText = 'position:fixed;bottom:52px;right:16px;z-index:10;padding:6px 12px;font-size:10px;';
    document.body.appendChild(orthoBtn);
    orthoBtn.addEventListener('click', function() {
      useOrtho = !useOrtho;
      this.classList.toggle('active');
      this.textContent = useOrtho ? '📐 正射投影' : '📐 透视投影';
      if (useOrtho) syncOrthoCamera();
    });

    // ==================== 动画循环 ====================
    function animate() {
      requestAnimationFrame(animate);

      // 1. 自动旋转
      if (isPlaying) {
        const speedRad = autoRotateSpeed * Math.PI / 180;
        if (rotMode === 'earth') {
          earthRotateGroup.rotation.y += speedRad;
          updateOpaqueSphereClipping();
          // 同步滑块
          earthRotation = (earthRotateGroup.rotation.y * 180 / Math.PI) % 360;
          if (earthRotation < 0) earthRotation += 360;
          sliderRot.value = earthRotation;
          rotVal.textContent = earthRotation.toFixed(0) + '°';

          // 地球自转时自动推进日期，每转一圈 ≈ 1天，赤纬缓慢变化
          dayAngle += speedRad / (2 * Math.PI) * (2 * Math.PI / 365.25);
          if (dayAngle > 2 * Math.PI) dayAngle -= 2 * Math.PI;
          const newDec = 23.44 * Math.sin(dayAngle);
          solarDeclination = newDec;
          // 同步赤纬滑块与显示
          sliderDec.value = newDec;
          decVal.textContent = newDec.toFixed(2) + '°';
          // 更新太阳位置、直射点、纬线
          updateSunPosition(newDec);
          // 更新同经线
          if (sameMeridianGroup.visible) updateSameMeridian();
          updateDate(newDec);
          // 日期变化后同步更新月球位置
          const simDate = getSimulatedDate(dayAngle);
          currentBaseDate = simDate;
          updateMoonPosition(simDate);
          // 更新月球数据面板
          updateMoonPanel(simDate);
        } else {
          // 天球反转
          celestialGroup.rotation.y -= speedRad;
          // 天球转动后太阳位置变化，更新光照方向
          updateSunLightPosition();
          // 更新直射点
          updateSubsolarPoint();
        }
      }

      // 2. 同步正交相机
      if (useOrtho) {
        syncOrthoCamera();
      }

      controls.update();

      // 3. 使用当前相机渲染（背面淡化使用 Three.js 内置 cameraPosition 自动更新）
      const activeCam = useOrtho ? orthoCamera : camera;
      renderer.render(scene, activeCam);
    }

    // ==================== 初始化 ====================
    // 同步滑块与日期计算值
    sliderDec.value = solarDeclination;
    sliderRot.value = earthRotation;
    updateAll();
    updateTilt();
    animate();

    console.log('✅ 天球-n 加载完成');
  </script>
</body>
</html>
