<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>赤道式日晷 · 全天日影对比 </title>
  <style>
    :root {
      --bg: #1a1a2e;
      --panel-bg: rgba(20, 20, 40, 0.94);
      --text: #e0e0e0;
      --accent: #f0b64f;
      --accent2: #5eb8d4;
      --slider-track: #3a3a55;
      --border: rgba(255, 255, 255, 0.15);
      --btn-bg: #2a2a44;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a14;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #canvas-container { position: fixed; inset: 0; z-index: 1; }
    #panel {
      position: fixed; top: 16px; right: 16px; z-index: 10;
      background: var(--panel-bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px 18px 14px; width: 290px;
      max-height: calc(100vh - 32px); overflow-y: auto;
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5); color: var(--text);
      display: flex; flex-direction: column; gap: 11px;
      transition: transform 0.3s, opacity 0.3s;
    }
    #panel.collapsed { transform: translateX(330px); opacity: 0; pointer-events: none; }
    #toggle-panel {
      position: fixed; top: 20px; right: 20px; z-index: 11;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--panel-bg);
      color: var(--text); cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px); transition: right 0.3s;
    }
    #toggle-panel.shifted { right: 318px; }
    #panel h3 { text-align: center; font-weight: 600; font-size: 16px; letter-spacing: 0.5px; color: var(--accent); margin-bottom: 2px; }
    .subtitle { text-align: center; font-size: 11px; color: #999; margin-top: -6px; margin-bottom: 2px; }
    .ctrl-group { display: flex; flex-direction: column; gap: 3px; }
    .ctrl-group label { font-size: 12px; font-weight: 500; color: #bbb; display: flex; justify-content: space-between; align-items: center; }
    .ctrl-group label span.val { color: var(--accent); font-weight: 600; font-size: 11px; min-width: 42px; text-align: right; }
    .ctrl-group input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px;
      background: var(--slider-track); outline: none; cursor: pointer;
    }
    .ctrl-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent); border: 2px solid #fff; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .ctrl-group input[type="color"] {
      width: 28px; height: 22px; border: 1px solid var(--border); border-radius: 4px;
      background: none; cursor: pointer; padding: 0; vertical-align: middle;
    }
    .btn-row { display: flex; gap: 7px; flex-wrap: wrap; }
    .btn {
      flex: 1; min-width: 60px; padding: 8px 6px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--btn-bg);
      color: #ccc; cursor: pointer; font-size: 11px; font-weight: 500;
      text-align: center; transition: all 0.2s; white-space: nowrap;
    }
    .btn:hover { background: #3a3a5a; color: #fff; }
    .btn.active { background: var(--accent); color: #1a1a2e; border-color: var(--accent); font-weight: 700; box-shadow: 0 0 12px rgba(240,182,79,0.4); }
    .btn.accent2.active { background: var(--accent2); color: #1a1a2e; border-color: var(--accent2); box-shadow: 0 0 12px rgba(94,184,212,0.4); }
    #time-display { text-align: center; font-size: 20px; font-weight: 700; letter-spacing: 1px; color: #fff; background: rgba(255,255,255,0.06); border-radius: 8px; padding: 6px; margin: 2px 0; }
    #sun-info { text-align: center; font-size: 11px; color: #999; line-height: 1.4; }
    #sun-info span { color: var(--accent2); font-weight: 500; }
    .legend { font-size: 10px; color: #888; text-align: center; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 8px; margin-top: 2px; line-height: 1.5; }
    @media (max-width: 600px) {
      #panel { width: 260px; right: 6px; top: 6px; padding: 14px 12px 10px; gap: 8px; border-radius: 12px; }
      #toggle-panel { top: 10px; right: 10px; width: 30px; height: 30px; font-size: 15px; }
      #toggle-panel.shifted { right: 275px; }
      #panel h3 { font-size: 14px; }
      #time-display { font-size: 17px; padding: 4px; }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="panel">
    <h3>☀️ 赤道式日晷 · 全天演示</h3>
    <div class="subtitle">太阳东升西落 · 日出日落定位</div>
    <div id="time-display">12:00</div>
    <div id="sun-info">高度角 <span id="alt-val">60°</span> · 方位角 <span id="az-val">180°</span></div>

    <div class="ctrl-group">
      <label>🌐 纬度 <span class="val" id="lat-val">35°N</span></label>
      <input type="range" id="latitude" min="-90" max="90" value="35" step="0.5">
    </div>
    <div class="ctrl-group">
      <label>🕐 时角 <span class="val" id="ha-val">0°</span></label>
      <input type="range" id="hour-angle" min="-180" max="180" value="0" step="0.5">
    </div>
    <div class="ctrl-group">
      <label>🌞 赤纬(直射点纬度) <span class="val" id="dec-val">0°</span></label>
      <input type="range" id="declination" min="-23.5" max="23.5" value="0" step="0.5">
    </div>
    <div class="ctrl-group">
      <label>📏 晷针长度 <span class="val" id="pillar-val">1.6</span></label>
      <input type="range" id="pillar-length" min="0.5" max="3.0" value="1.6" step="0.1">
    </div>

    <div class="btn-row">
      <button class="btn active" id="btn-both">日晷+立杆</button>
      <button class="btn" id="btn-sundial">仅日晷</button>
      <button class="btn accent2" id="btn-pole">仅立杆</button>
      <button class="btn active" id="btn-old-path">📍 地面中心</button>
      <button class="btn" id="btn-new-path">📍 日晷中心</button>
      <button class="btn" id="btn-time-marks">🕐 时间点</button>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-sunrise">🌅 日出</button>
      <button class="btn" id="btn-noon">🔆 正午</button>
      <button class="btn" id="btn-sunset">🌇 日落</button>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-globe">🌍 地球仪</button>
      <button class="btn" id="btn-globe-texture">🗺️ 地球纹理</button>
      <button class="btn" id="btn-sun-point">☀️ 直射点</button>
      <button class="btn" id="btn-sun-arrow">➡️ 太阳光</button>
      <button class="btn" id="btn-ground-shadow">🌑 地面挡光</button>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-auto-play">▶ 自动播放</button>
      <button class="btn" id="btn-globe-rotate">🔄 地球自转</button>
    </div>
    <div class="ctrl-group">
      <label>🌍 地球仪透明度 <span class="val" id="globe-opacity-val">0.60</span></label>
      <input type="range" id="globe-opacity" min="0.05" max="1.0" value="0.6" step="0.01">
    </div>
    <div class="ctrl-group">
      <label>🎨 轨迹颜色 地上 <input type="color" id="path-color-above" value="#ffcc66"> 地下/时间点 <input type="color" id="path-color-below" value="#ff8844"></label>
    </div>
    <div class="ctrl-group">
      <label>📏 轨迹粗细 <span class="val" id="path-width-val">3</span></label>
      <input type="range" id="path-width" min="1" max="10" value="3" step="0.5">
    </div>
    <div class="legend">
      🖱️ 拖拽旋转视角 · 滚轮缩放 · 右键平移<br>
      ⚡ 空格=播放 · N=正午 · R=日出 · S=日落
    </div>
  </div>
  <button id="toggle-panel" class="shifted" title="隐藏面板">☰</button>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Line2 } from 'three/addons/lines/Line2.js';
    import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
    import { LineGeometry } from 'three/addons/lines/LineGeometry.js';

    // ---------- DOM ----------
    const container = document.getElementById('canvas-container');
    const panel = document.getElementById('panel');
    const toggleBtn = document.getElementById('toggle-panel');
    const timeDisplay = document.getElementById('time-display');
    const altSpan = document.getElementById('alt-val');
    const azSpan = document.getElementById('az-val');
    const latSpan = document.getElementById('lat-val');
    const haSpan = document.getElementById('ha-val');
    const decSpan = document.getElementById('dec-val');
    const pillarSpan = document.getElementById('pillar-val');
    const globeOpacitySpan = document.getElementById('globe-opacity-val');

    const sliderLat = document.getElementById('latitude');
    const sliderHA = document.getElementById('hour-angle');
    const sliderDec = document.getElementById('declination');
    const sliderPillar = document.getElementById('pillar-length');
    const sliderGlobeOpacity = document.getElementById('globe-opacity');

    const btnBoth = document.getElementById('btn-both');
    const btnSundial = document.getElementById('btn-sundial');
    const btnPole = document.getElementById('btn-pole');
    const btnAutoPlay = document.getElementById('btn-auto-play');
    const btnNoon = document.getElementById('btn-noon');
    const btnSunrise = document.getElementById('btn-sunrise');
    const btnSunset = document.getElementById('btn-sunset');
    const btnGlobe = document.getElementById('btn-globe');
    const btnGlobeTexture = document.getElementById('btn-globe-texture');
    const btnGlobeRotate = document.getElementById('btn-globe-rotate');
    const btnSunPoint = document.getElementById('btn-sun-point');
    const btnSunArrow = document.getElementById('btn-sun-arrow');
    const btnGroundShadow = document.getElementById('btn-ground-shadow');
    const btnOldPath = document.getElementById('btn-old-path');
    const btnNewPath = document.getElementById('btn-new-path');
    const btnTimeMarks = document.getElementById('btn-time-marks');
    const pathColorAbove = document.getElementById('path-color-above');
    const pathColorBelow = document.getElementById('path-color-below');
    const sliderPathWidth = document.getElementById('path-width');
    const pathWidthVal = document.getElementById('path-width-val');

    // ---------- 状态 ----------
    let latitude = 35;
    let hourAngle = 0;
    let declination = 0;
    let pillarLength = 1.6;
    let displayMode = 'both';
    let autoPlay = false;
    const autoSpeed = 0.25;
    let autoDir = 1;
    let showGlobe = false;
    let showGlobeRotate = false;
    let showSunPoint = false;
    let showSunArrow = false;
    let showGroundShadow = false;
    let showOldPath = true;
    let showNewPath = false;
    let showTimeMarks = false;
    let pathWidth = 3;
    let sunTimeMode = 'free'; // 'free', 'sunrise', 'noon', 'sunset'
    let globeRotationAngle = 0;
    let globeOpacity = 0.6;
    // 状态记忆变量
    let prevGlobeTextureState = false;
    let prevSunPointState = false;
    let prevGlobeRotateState = false;
    let prevSunArrowState = false;
    let polaris, polarisLabel;
    let sunInfoLabel = null;

    // ---------- Three.js 初始化 ----------
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a30);
    scene.fog = new THREE.Fog(0x1a1a30, 30, 90);

    const camera = new THREE.PerspectiveCamera(46, window.innerWidth / window.innerHeight, 1, 200);
    camera.position.set(9, 7, 14);
    camera.lookAt(0, 3.5, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 3.5, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.12;
    controls.minDistance = 4;
    controls.maxDistance = 45;
    controls.maxPolarAngle = Math.PI * 0.8;
    controls.update();

    // ---------- 光照 ----------
    const ambient = new THREE.AmbientLight(0x3a3a60, 1.5);
    scene.add(ambient);
    const hemi = new THREE.HemisphereLight(0x8899cc, 0x443322, 0.8);
    scene.add(hemi);

    const sunLight = new THREE.DirectionalLight(0xfff8e8, 7.0);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 4096;
    sunLight.shadow.mapSize.height = 4096;
    sunLight.shadow.camera.near = 0.4;
    sunLight.shadow.camera.far = 80;
    sunLight.shadow.camera.left = -20;
    sunLight.shadow.camera.right = 20;
    sunLight.shadow.camera.top = 20;
    sunLight.shadow.camera.bottom = -20;
    sunLight.shadow.bias = -0.00015;
    sunLight.shadow.normalBias = 0.02;
    scene.add(sunLight);
    scene.add(sunLight.target);
    sunLight.target.position.set(0, 3.5, 0);

    // ---------- 地面与方位 ----------
    const groundGeo = new THREE.CircleGeometry(14, 128);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0xc8c0b4, roughness: 0.7, metalness: 0.05 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.02;
    ground.receiveShadow = true;
    scene.add(ground);

    const ringGeo = new THREE.TorusGeometry(14, 0.08, 16, 160);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0x888078, roughness: 0.5, metalness: 0.3 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.0;
    ring.receiveShadow = true;
    scene.add(ring);

    const gridHelper = new THREE.PolarGridHelper(8, 36, 28, 256, 0x888888, 0x666666);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    function createMarker(text, pos, color) {
      const canvas = document.createElement('canvas');
      canvas.width = 256; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = color;
      ctx.font = 'bold 50px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, 128, 64);
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false, depthWrite: false });
      const sprite = new THREE.Sprite(mat);
      sprite.position.copy(pos);
      sprite.scale.set(2.2, 1.1, 1);
      sprite.renderOrder = 999;
      return sprite;
    }
    scene.add(createMarker('N', new THREE.Vector3(0, 0.35, -8.5), '#ff6666'));
    scene.add(createMarker('S', new THREE.Vector3(0, 0.35, 8.5), '#ffffff'));
    scene.add(createMarker('E', new THREE.Vector3(8.5, 0.35, 0), '#aaaaaa'));
    scene.add(createMarker('W', new THREE.Vector3(-8.5, 0.35, 0), '#aaaaaa'));

    // 添加北极星（北极星位于北天极，固定不动）
    function createPolaris() {
      const canvas = document.createElement('canvas');
      canvas.width = 256; canvas.height = 256;
      const ctx = canvas.getContext('2d');
      
      // 绘制星星效果
      const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
      gradient.addColorStop(0, 'rgba(255, 255, 200, 1)');
      gradient.addColorStop(0.3, 'rgba(255, 255, 150, 0.8)');
      gradient.addColorStop(1, 'rgba(255, 255, 100, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(128, 128, 128, 0, Math.PI * 2);
      ctx.fill();
      
      // 绘制星星文字
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 40px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('★', 128, 128);
      
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false, depthWrite: false });
      const sprite = new THREE.Sprite(mat);
      sprite.position.set(0, 25, 0);
      sprite.scale.set(1.5, 1.5, 1);
      sprite.renderOrder = 999;
      return sprite;
    }
    polaris = createPolaris();
    scene.add(polaris);
    
    // 添加北极星文字标记
    polarisLabel = createMarker('北极星', new THREE.Vector3(0, 26.5, 0), '#ffffff');
    scene.add(polarisLabel);

    function createDot(color, pos) {
      const geo = new THREE.SphereGeometry(0.14, 16, 16);
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.3, emissive: color, emissiveIntensity: 0.6 });
      const dot = new THREE.Mesh(geo, mat);
      dot.position.copy(pos);
      dot.receiveShadow = true; dot.castShadow = true;
      return dot;
    }
    scene.add(createDot(0xff4444, new THREE.Vector3(0, 0.08, -7.5)));
    scene.add(createDot(0xffffff, new THREE.Vector3(0, 0.08, 7.5)));
    scene.add(createDot(0xcccccc, new THREE.Vector3(7.5, 0.08, 0)));
    scene.add(createDot(0xcccccc, new THREE.Vector3(-7.5, 0.08, 0)));

    // ---------- 纹理生成（双面独立画布）----------
    function createDialTexture(faceType) {
      const canvas = document.createElement('canvas');
      canvas.width = 1024; canvas.height = 1024;
      const ctx = canvas.getContext('2d');
      
      ctx.fillStyle = '#f7f2e8';
      ctx.beginPath(); ctx.arc(512, 512, 500, 0, Math.PI * 2); ctx.fill();
      
      ctx.strokeStyle = '#5a4a38'; ctx.lineWidth = 14;
      ctx.beginPath(); ctx.arc(512, 512, 485, 0, Math.PI * 2); ctx.stroke();
      ctx.strokeStyle = '#7a6a55'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(512, 512, 440, 0, Math.PI * 2); ctx.stroke();
      
      for (let i = 0; i < 24; i++) {
        const angleDeg = i * 15 + 180;
        const angleRad = (angleDeg - 90) * Math.PI / 180;
        const major = (i % 6 === 0);
        const innerR = 50, outerR = major ? 440 : 420;
        
        ctx.strokeStyle = major ? '#3a2a18' : '#5a4a35';
        ctx.lineWidth = major ? 6 : 3.5;
        ctx.beginPath();
        ctx.moveTo(512 + innerR * Math.cos(angleRad), 512 + innerR * Math.sin(angleRad));
        ctx.lineTo(512 + outerR * Math.cos(angleRad), 512 + outerR * Math.sin(angleRad));
        ctx.stroke();
        
        if (i % 1 === 0) {
          const numR = 340;
          const x = 512 + numR * Math.cos(angleRad);
          const y = 512 + numR * Math.sin(angleRad);
          
          ctx.save();
          ctx.translate(x, y);
          if (faceType === 'bottom') {
            // 底面需要反向旋转
            ctx.rotate(angleRad + Math.PI / 2);
            ctx.scale(1, -1);
          } else {
            // 顶面正常旋转
            ctx.rotate(angleRad - Math.PI / 2);
          }
          ctx.fillStyle = '#3a2a18';
          ctx.font = 'bold 38px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const hourNum = (i + 6) % 24 || 24;
          ctx.fillText(hourNum.toString(), 0, 0);
          ctx.restore();
        }
      }
      
      ctx.fillStyle = '#3a2a18';
      ctx.beginPath(); ctx.arc(512, 512, 16, 0, Math.PI * 2); ctx.fill();
      
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.minFilter = THREE.LinearMipmapLinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.generateMipmaps = true;
      return texture;
    }

    const topTex = createDialTexture('top');
    const bottomTex = createDialTexture('bottom');

    // ---------- 赤道式日晷（居中，高度降低20%）----------
    const sundialGroup = new THREE.Group();
    scene.add(sundialGroup);

    const baseSize = 3.8;
    const baseHeight = 0.75;
    const baseGeo = new THREE.BoxGeometry(baseSize, baseHeight, baseSize);
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x7a6a5a, roughness: 0.5, metalness: 0.25 });
    const baseBlock = new THREE.Mesh(baseGeo, baseMat);
    baseBlock.position.y = baseHeight / 2;
    baseBlock.castShadow = true;
    baseBlock.receiveShadow = true;
    sundialGroup.add(baseBlock);

    const edgeGeo = new THREE.BoxGeometry(baseSize + 0.25, 0.1, baseSize + 0.25);
    const edgeMat = new THREE.MeshStandardMaterial({ color: 0x9a8a78, roughness: 0.4, metalness: 0.3 });
    const edge = new THREE.Mesh(edgeGeo, edgeMat);
    edge.position.y = baseHeight + 0.05;
    edge.castShadow = true;
    edge.receiveShadow = true;
    sundialGroup.add(edge);

    // 原高度3.2，降低20%后为2.56
    const axisHeight = 2.56;
    const axisPivot = new THREE.Group();
    axisPivot.position.y = baseHeight + axisHeight;
    axisPivot.rotation.x = (latitude - 90) * Math.PI / 180;
    sundialGroup.add(axisPivot);

    // 晷针长度
    let pillarTop, pillarBot, topBall, botBall;
    
    function createPillar() {
      // 清理旧的晷针
      if (pillarTop) axisPivot.remove(pillarTop);
      if (pillarBot) axisPivot.remove(pillarBot);
      if (topBall) axisPivot.remove(topBall);
      if (botBall) axisPivot.remove(botBall);
      
      const pillarRadius = 0.12;
      
      const pillarTopGeo = new THREE.CylinderGeometry(pillarRadius, pillarRadius, pillarLength, 32);
      const pillarMat = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.35, metalness: 0.65 });
      pillarTop = new THREE.Mesh(pillarTopGeo, pillarMat);
      pillarTop.position.y = pillarLength / 2;
      pillarTop.castShadow = true;

      const pillarBotGeo = new THREE.CylinderGeometry(pillarRadius, pillarRadius, pillarLength, 32);

      pillarBot.position.y = -pillarLength / 2;

      topBall = new THREE.Mesh(
        new THREE.SphereGeometry(0.16, 16, 16),

      botBall.position.y = -pillarLength - 0.16;
      botBall.castShadow = true;
      axisPivot.add(botBall);
    }
    
    // 初始创建晷针
    createPillar();

    // 支架高度降低20%：原3.2 -> 2.56
    const supportHeight = 2.56;
    
    // 晷盘半径设为支架高度
    const dialRadius = supportHeight;
    const dialThickness = 0.12;

    const dialTopMat = new THREE.MeshStandardMaterial({ map: topTex, roughness: 0.35, metalness: 0.05, color: 0xfefefe });
    const dialSideMat = new THREE.MeshStandardMaterial({ color: 0x7a6a55, roughness: 0.5, metalness: 0.2 });
    const dialBottomMat = new THREE.MeshStandardMaterial({ map: bottomTex, roughness: 0.35, metalness: 0.05, color: 0xe8e0d5 });

    const dialMesh = new THREE.Mesh(dialGeo, [dialSideMat, dialTopMat, dialBottomMat]);
    dialMesh.position.y = 0.0;
    dialMesh.castShadow = true;

    axisPivot.add(dialMesh);

    // ---------- 地球仪 ----------
    let globeObjects = [];
    let globeMesh, globeMaterial, earthTextureCache;
    let sunPointMesh;
    let globeRotateGroup;
    let showGlobeTexture = false;
    
    const createGlobe = () => {
      // 地球本体
      const globeGeo = new THREE.SphereGeometry(dialRadius, 64, 32);
      // 加载真实的地球纹理
      const textureLoader = new THREE.TextureLoader();
      earthTextureCache = textureLoader.load(
        'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg',

          texture.minFilter = THREE.LinearFilter;

          // 纹理加载完成后更新显示
          updateGlobeTexture();
        },
        undefined,
        (error) => {
          console.error('纹理加载失败，使用备用纹理');
          // 备用简单纹理
          const canvas = document.createElement('canvas');
          canvas.width = 1024;

          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#4a90d9';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#5a9a5a';
          ctx.beginPath();
          ctx.ellipse(180, 150, 80, 120, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(220, 350, 60, 80, 0.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(520, 120, 60, 40, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(550, 280, 70, 110, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(700, 170, 120, 100, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(820, 360, 40, 50, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#dddde8';
          ctx.beginPath();
          ctx.ellipse(512, 480, 400, 50, 0, 0, Math.PI * 2);
          ctx.fill();
          earthTextureCache = new THREE.CanvasTexture(canvas);
          earthTextureCache.minFilter = THREE.LinearFilter;
          earthTextureCache.wrapS = THREE.RepeatWrapping;
          earthTextureCache.wrapT = THREE.RepeatWrapping;
          updateGlobeTexture();
        }
      );
      
      globeMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x4a90d9, 
        roughness: 0.7, 
        metalness: 0.1,
        transparent: true,
        opacity: 0.6,
        map: null
      });
      // 创建一个用于旋转的组，包含地球球面和太阳直射点
      globeRotateGroup = new THREE.Group();
      axisPivot.add(globeRotateGroup);
      
      globeMesh = new THREE.Mesh(globeGeo, globeMaterial);
      globeMesh.position.y = 0;
      globeMesh.castShadow = false;
      globeMesh.receiveShadow = false;
      globeRotateGroup.add(globeMesh);
      globeObjects.push(globeMesh);

      // 地球仪经线纬线
      const wireframeMat = new THREE.LineBasicMaterial({ 
        color: 0x2a6099, 
        transparent: true, 
        opacity: 0.7 
      });
      
      // 纬线
      for (let lat = -75; lat <= 75; lat += 15) {
        const latRad = lat * Math.PI / 180;
        const r = dialRadius * Math.cos(latRad);
        const yPos = dialRadius * Math.sin(latRad);
        const ringGeo = new THREE.RingGeometry(r - 0.002, r + 0.002, 64);
        const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ 
          color: 0x2a6099, 
          side: THREE.DoubleSide, 
          transparent: true, 
          opacity: 0.9 
        }));
        ring.position.y = yPos;
        ring.rotation.x = Math.PI / 2;
        globeRotateGroup.add(ring);
        globeObjects.push(ring);
      }
      
      // 经线
      for (let lon = 0; lon < 180; lon += 15) {
        const lonRad = lon * Math.PI / 180;
        const ringGeo = new THREE.RingGeometry(dialRadius - 0.002, dialRadius + 0.002, 64);
        const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ 
          color: 0x2a6099, 
          side: THREE.DoubleSide, 
          transparent: true, 
          opacity: 0.9 
        }));
        ring.rotation.y = lonRad;
        globeRotateGroup.add(ring);
        globeObjects.push(ring);
      }

      // 地轴延长线（固定，不随地球自转）
      const globeAxisGeo = new THREE.CylinderGeometry(0.03, 0.03, dialRadius * 2.5, 16);
      const globeAxisMat = new THREE.MeshStandardMaterial({ 
        color: 0x888888, 
        roughness: 0.6, 
        metalness: 0.3 
      });
      const globeAxis = new THREE.Mesh(globeAxisGeo, globeAxisMat);
      globeAxis.position.y = 0;
      globeAxis.castShadow = false;
      globeAxis.receiveShadow = false;
      axisPivot.add(globeAxis);
      globeObjects.push(globeAxis);
      
      // 太阳直射点标记
      const sunPointGeo = new THREE.SphereGeometry(0.08, 16, 16);
      const sunPointMat = new THREE.MeshStandardMaterial({ 
        color: 0xff6600, 
        roughness: 0.3, 
        metalness: 0.2,
        emissive: 0xff4400,
        emissiveIntensity: 1.0
      });
      sunPointMesh = new THREE.Mesh(sunPointGeo, sunPointMat);
      sunPointMesh.position.set(0, 0, dialRadius * 1.01);
      sunPointMesh.castShadow = false;
      sunPointMesh.receiveShadow = false;
      sunPointMesh.visible = false;
      axisPivot.add(sunPointMesh);
      globeObjects.push(sunPointMesh);
    };
    createGlobe();
    updateGlobeOpacity();

    // 地球仪可见性和纹理控制
    const updateGlobeVisibility = () => {
      globeObjects.forEach(obj => {
        obj.visible = showGlobe;
      });
      // 太阳直射点单独控制
      if (sunPointMesh) {
        sunPointMesh.visible = showGlobe && showSunPoint;
      }
    };
    
    const updateGlobeTexture = () => {
      if (showGlobeTexture) {
        globeMaterial.map = earthTextureCache;
        globeMaterial.color.set(0xffffff);
      } else {
        globeMaterial.map = null;
        globeMaterial.color.set(0x4a90d9);
      }
      updateGlobeOpacity();
    };
    
    // 更新太阳直射点位置
    const updateSunPoint = () => {
      if (!sunPointMesh || !showGlobe) return;
      
      // 直接使用太阳方位角和高度角计算直射点，保持与太阳运动一致
      const sunData = getSunPosition(latitude, hourAngle, declination);
      const azRad = sunData.azRad;
      const altRad = sunData.altDeg * Math.PI / 180;
      
      // 因为地球仪倾斜了，我们需要计算在地球仪表面的对应位置
      // 直射点应该指向太阳的方向
      const r = dialRadius * 1.01;
      // 先计算在当地水平面的方向
      const cosAlt = Math.max(0, Math.cos(altRad));
      let px = r * Math.sin(azRad) * cosAlt;
      let py = r * Math.sin(altRad);
      let pz = -r * Math.cos(azRad) * cosAlt;
      
      // 但是因为地球仪是倾斜的，我们需要反向旋转到地球仪坐标系
      // 不过更简单的是：在地球仪坐标系中，直射点与太阳位置相对于晷盘中心的方向一致
      // 先获取太阳相对于晷盘中心的方向
      const sundialCenter = new THREE.Vector3(0, baseHeight + axisHeight, 0);
      const sunDir = sunVis.position.clone().sub(sundialCenter).normalize();
      
      // 我们需要将这个方向转换到地球仪的局部坐标系
      // 先创建一个点在晷盘中心上方
      const point = sundialCenter.clone().add(sunDir.clone().multiplyScalar(r));
      
      // 现在将这个点转换到地球仪的局部坐标系
      // axisPivot 包含地球仪，并且已经根据纬度倾斜
      // 我们需要反向操作：将世界坐标转换到 axisPivot 的局部坐标系
      const matrix = axisPivot.matrixWorld.clone().invert();
      point.applyMatrix4(matrix);
      
      // 现在 point 是在 axisPivot 局部坐标系中的点
      // 但是我们希望直射点在地球仪表面，所以我们需要重新计算
      // 实际上，更简单的方法是：在地球仪坐标系中，直射点就是太阳的方向，但是要考虑地球仪的倾斜
      // 让我们用更直接的球坐标方法，匹配太阳的运动
      const haRad = hourAngle * Math.PI / 180;
      const decRad = declination * Math.PI / 180;
      
      // 地球仪的 0 时角方向是 -Z，太阳时角增加时向西（+X）旋转
      // 我们希望直射点的运动与太阳在天空中的运动一致
      // 同时需要让直射点位置旋转180°
      const haRadRotated = (hourAngle + 180) * Math.PI / 180;
      px = r * Math.cos(decRad) * Math.sin(haRadRotated);
      py = r * Math.sin(decRad);
      pz = -r * Math.cos(decRad) * Math.cos(haRadRotated);
      
      sunPointMesh.position.set(px, py, pz);
    };
    
    updateGlobeVisibility();

    const supportRadius = 0.15;
    const supportGeo = new THREE.CylinderGeometry(supportRadius, supportRadius, supportHeight, 16);
    const supportMat = new THREE.MeshStandardMaterial({ color: 0x8a7a6a, roughness: 0.45, metalness: 0.4 });
    const supportPillar = new THREE.Mesh(supportGeo, supportMat);
    supportPillar.position.y = supportHeight / 2;
    supportPillar.castShadow = true;
    supportPillar.receiveShadow = true;
    
    const supportGroup = new THREE.Group();
    supportGroup.position.y = baseHeight;
    supportGroup.add(supportPillar);
    sundialGroup.add(supportGroup);

    const ringGeo2 = new THREE.TorusGeometry(supportRadius + 0.1, 0.06, 8, 16);
    const ringMat2 = new THREE.MeshStandardMaterial({ color: 0x9a8a78, roughness: 0.4, metalness: 0.3 });
    const supportRing = new THREE.Mesh(ringGeo2, ringMat2);
    supportRing.position.y = 0.05;
    supportRing.rotation.x = Math.PI / 2;
    supportRing.castShadow = true;
    supportRing.receiveShadow = true;
    supportGroup.add(supportRing);

    const labelCanvas = document.createElement('canvas');
    labelCanvas.width = 256; labelCanvas.height = 64;
    const lctx = labelCanvas.getContext('2d');
    lctx.fillStyle = '#fff'; lctx.font = 'bold 28px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    lctx.textAlign = 'center'; lctx.textBaseline = 'middle';
    lctx.fillText('赤道式日晷', 128, 32);
    const labelTex = new THREE.CanvasTexture(labelCanvas);
    labelTex.minFilter = THREE.LinearFilter;
    const labelSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: labelTex, transparent: true, depthTest: false, depthWrite: false }));
    labelSprite.position.set(0, 6.0, 0);
    labelSprite.scale.set(3.6, 0.9, 1);
    labelSprite.renderOrder = 998;
    sundialGroup.add(labelSprite);

    // ---------- 竖直立杆 ----------
    const poleGroup = new THREE.Group();
    poleGroup.position.set(5.5, 0, 0);
    scene.add(poleGroup);

    const poleBase = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3, 0.36, 0.45, 24),
      new THREE.MeshStandardMaterial({ color: 0x7a7068, roughness: 0.5, metalness: 0.2 })
    );
    poleBase.position.y = 0.225;
    poleBase.castShadow = true; poleBase.receiveShadow = true;
    poleGroup.add(poleBase);

    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.09, 0.12, 4.2, 24),
      new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.3, metalness: 0.5 })
    );
    pole.position.y = 2.35;
    pole.castShadow = true; pole.receiveShadow = true;
    poleGroup.add(pole);

    const poleTip = new THREE.Mesh(
      new THREE.SphereGeometry(0.18, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xff4422, roughness: 0.25, metalness: 0.3, emissive: 0x331100, emissiveIntensity: 0.5 })
    );
    poleTip.position.y = 4.48;
    poleTip.castShadow = true;
    poleGroup.add(poleTip);

    const poleLabelCanvas = document.createElement('canvas');
    poleLabelCanvas.width = 256; poleLabelCanvas.height = 64;
    const plctx = poleLabelCanvas.getContext('2d');
    plctx.fillStyle = '#fff'; plctx.font = 'bold 30px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    plctx.textAlign = 'center'; plctx.textBaseline = 'middle';
    plctx.fillText('竖直立杆', 128, 32);
    const poleLabelTex = new THREE.CanvasTexture(poleLabelCanvas);
    poleLabelTex.minFilter = THREE.LinearFilter;
    const poleLabelSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: poleLabelTex, transparent: true, depthTest: false, depthWrite: false }));
    poleLabelSprite.position.set(0, 4.9, 0);
    poleLabelSprite.scale.set(2.6, 0.7, 1);
    poleLabelSprite.renderOrder = 998;
    poleGroup.add(poleLabelSprite);

    // ---------- 太阳可视化 ----------
    const sunVis = new THREE.Group();
    scene.add(sunVis);
    const sunSphere = new THREE.Mesh(new THREE.SphereGeometry(0.7, 48, 48), new THREE.MeshBasicMaterial({ color: 0xffe8a0 }));
    sunVis.add(sunSphere);
    for (let i = 0; i < 3; i++) {
      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(0.75 + i * 0.34, 32, 32),
        new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(0.13, 0.9, 0.6 + i * 0.12), transparent: true, opacity: 0.22 - i * 0.06, depthTest: false, depthWrite: false })
      );
      glow.renderOrder = 1;
      sunVis.add(glow);
    }

    // ---------- 太阳轨迹弧线 ----------
    const pathGroup = new THREE.Group();
    scene.add(pathGroup);
    
    // 太阳方位标记点
    const sunMarker = new THREE.Mesh(
      new THREE.SphereGeometry(0.25, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0xff8800, emissiveIntensity: 0.6 })
    );
    sunMarker.castShadow = false;
    sunMarker.receiveShadow = false;
    pathGroup.add(sunMarker);

    // 太阳-直射点连线箭头
    const sunArrow = new THREE.ArrowHelper(
      new THREE.Vector3(1, 0, 0),
      new THREE.Vector3(0, 0, 0),
      1,
      0xff8800,
      0.6,
      0.3
    );
    sunArrow.visible = false;
    scene.add(sunArrow);

    // ---------- 新太阳轨迹（以日晷中心为圆心）----------
    const newPathGroup = new THREE.Group();
    scene.add(newPathGroup);

    // 虚拟地面（日晷中心模式下显示）
    const virtualGround = new THREE.Mesh(
      new THREE.CircleGeometry(15, 64),
      new THREE.MeshBasicMaterial({ color: 0x4488aa, transparent: true, opacity: 0.15, side: THREE.DoubleSide, depthWrite: false })
    );
    virtualGround.rotation.x = -Math.PI / 2;
    virtualGround.position.y = baseHeight + axisHeight;
    virtualGround.visible = false;
    scene.add(virtualGround);

    function updateVirtualGround() {
      virtualGround.visible = showNewPath;
    }

    function createFatLine(points, color, opacity, dashed, dashSize, gapSize) {
      const positions = [];
      points.forEach(p => positions.push(p.x, p.y, p.z));
      const geo = new LineGeometry();
      geo.setPositions(positions);
      const mat = new LineMaterial({
        color: new THREE.Color(color),
        linewidth: pathWidth,
        transparent: true,
        opacity: opacity,
        depthTest: true,
        dashed: !!dashed,
        dashScale: 1,
        dashSize: dashSize || 1,
        gapSize: gapSize || 0.5,
        resolution: new THREE.Vector2(window.innerWidth, window.innerHeight)
      });
      const line = new Line2(geo, mat);
      line.computeLineDistances();
      line.renderOrder = 2;
      return line;
    }

    // 时间节点
    const hourDotGeo = new THREE.SphereGeometry(0.12, 8, 8);
    const halfHourDotGeo = new THREE.SphereGeometry(0.06, 6, 6);

    function createTimeLabel(text, pos) {
      const canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = pathColorBelow.value;
      ctx.font = 'bold 36px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, 64, 32);
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.85, depthTest: false, depthWrite: false });
      const sprite = new THREE.Sprite(mat);
      sprite.position.copy(pos);
      sprite.position.y += 0.35;
      sprite.scale.set(1.2, 0.6, 1);
      sprite.renderOrder = 4;
      return sprite;
    }

    function calcSunPosOnPath(haDeg, offset) {
      const sunPos = getSunPosition(latitude, haDeg, declination);
      const alt = sunPos.altDeg * Math.PI / 180;
      const azRad = sunPos.azRad;
      const cosAlt = Math.cos(alt);
      const r = 11;
      return new THREE.Vector3(
        r * Math.sin(azRad) * cosAlt + offset.x,
        r * Math.sin(alt) + offset.y,
        -r * Math.cos(azRad) * cosAlt + offset.z
      );
    }

    function addTimeMarksToGroup(group, offset) {
      if (!showTimeMarks) return;
      const phi = latitude * Math.PI / 180;
      const delta = declination * Math.PI / 180;
      const cosH0 = -Math.tan(phi) * Math.tan(delta);
      let Hmax = Math.PI;
      if (cosH0 < -1) Hmax = Math.PI;
      else if (cosH0 > 1) Hmax = 0;
      else Hmax = Math.acos(cosH0);
      Hmax = Math.min(Hmax, Math.PI * 0.98);

      for (let h = 0; h <= 24; h++) {
        const haDeg = (h - 12) * 15;
        if (Math.abs(haDeg) > Hmax * 180 / Math.PI + 0.5) continue;
        const pos = calcSunPosOnPath(haDeg, offset);
        const dot = new THREE.Mesh(hourDotGeo, new THREE.MeshBasicMaterial({ color: pathColorBelow.value }));
        dot.position.copy(pos);
        dot.renderOrder = 3;
        group.add(dot);

        const label = createTimeLabel(h + '时', pos);
        group.add(label);

        if (h < 24) {
          const haDegHalf = haDeg + 7.5;
          if (Math.abs(haDegHalf) > Hmax * 180 / Math.PI + 0.5) continue;
          const halfPos = calcSunPosOnPath(haDegHalf, offset);
          const halfDot = new THREE.Mesh(halfHourDotGeo, new THREE.MeshBasicMaterial({ color: pathColorBelow.value, transparent: true, opacity: 0.7 }));
          halfDot.position.copy(halfPos);
          halfDot.renderOrder = 3;
          group.add(halfDot);
        }
      }
    }

    const newSunBall = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xffdd44, transparent: true, opacity: 0.6 })
    );
    newSunBall.castShadow = false;
    newSunBall.receiveShadow = false;
    newSunBall.visible = false;
    newPathGroup.add(newSunBall);

    function updateNewSunPath() {
      while (newPathGroup.children.length > 1) {
        newPathGroup.remove(newPathGroup.children.find(c => c !== newSunBall));
      }

      const phi = latitude * Math.PI / 180;
      const delta = declination * Math.PI / 180;
      const cosH0 = -Math.tan(phi) * Math.tan(delta);
      let Hmax = Math.PI;
      if (cosH0 < -1) Hmax = Math.PI;
      else if (cosH0 > 1) Hmax = 0;
      else Hmax = Math.acos(cosH0);
      Hmax = Math.min(Hmax, Math.PI * 0.98);

      const sundialCenter = new THREE.Vector3(0, baseHeight + axisHeight, 0);
      const r = 11;

      const pts = [];
      for (let i = 0; i <= 240; i++) {
        const H = -Hmax + (2 * Hmax * i) / 240;
        const sunPos = getSunPosition(latitude, H * 180 / Math.PI, declination);
        const alt = sunPos.altDeg * Math.PI / 180;
        const azRad = sunPos.azRad;
        const cosAlt = Math.cos(alt);
        const x = r * Math.sin(azRad) * cosAlt;
        const y = r * Math.sin(alt);
        const z = -r * Math.cos(azRad) * cosAlt;
        pts.push(new THREE.Vector3(x + sundialCenter.x, y + sundialCenter.y, z + sundialCenter.z));
      }

      const curve = new THREE.CatmullRomCurve3(pts);
      const curvePts = curve.getPoints(400);
      const above = [], below = [];
      curvePts.forEach(p => (p.y >= sundialCenter.y - 0.05 ? above : below).push(p.clone()));

      if (above.length > 1) {
        const line = createFatLine(above, pathColorAbove.value, 0.5, true, 0.4, 0.4);
        newPathGroup.add(line);
      }
      if (below.length > 1) {
        const belowLine = createFatLine(below, pathColorBelow.value, 0.3, true, 0.4, 0.4);
        newPathGroup.add(belowLine);
      }

      // 更新新太阳小球位置
      const sunData = getSunPosition(latitude, hourAngle, declination);
      const alt = sunData.altDeg * Math.PI / 180;
      const azRad = sunData.azRad;
      const cosAlt = Math.cos(alt);
      newSunBall.position.set(
        r * Math.sin(azRad) * cosAlt + sundialCenter.x,
        r * Math.sin(alt) + sundialCenter.y,
        -r * Math.cos(azRad) * cosAlt + sundialCenter.z
      );

      newPathGroup.visible = showNewPath;
      newSunBall.visible = showNewPath;

      if (showNewPath) {
        addTimeMarksToGroup(newPathGroup, sundialCenter);
      }
    }

    function updateSunArrow() {
      if (!showSunArrow || !showGlobe || !showSunPoint || !sunPointMesh || !showNewPath) {
        sunArrow.visible = false;
        return;
      }
      const start = newSunBall.position.clone();
      const end = new THREE.Vector3();
      sunPointMesh.getWorldPosition(end);
      const dir = end.clone().sub(start);
      const length = dir.length();
      if (length < 0.01) {
        sunArrow.visible = false;
        return;
      }
      dir.normalize();
      sunArrow.position.copy(start);
      sunArrow.setDirection(dir);
      sunArrow.setLength(length, Math.min(0.6, length * 0.2), Math.min(0.3, length * 0.1));
      sunArrow.visible = true;
    }

    function updateSunPath() {
      // 保存太阳标记点
      const marker = pathGroup.children.find(child => child === sunMarker);
      if (marker) pathGroup.remove(marker);
      
      while (pathGroup.children.length) pathGroup.remove(pathGroup.children[0]);
      
      // 恢复太阳标记点
      if (marker) pathGroup.add(marker);
      
      const phi = latitude * Math.PI / 180;
      const delta = declination * Math.PI / 180;
      const cosH0 = -Math.tan(phi) * Math.tan(delta);
      let Hmax = Math.PI;
      if (cosH0 < -1) Hmax = Math.PI;
      else if (cosH0 > 1) Hmax = 0;
      else Hmax = Math.acos(cosH0);
      Hmax = Math.min(Hmax, Math.PI * 0.98);

      const pts = [];
      for (let i = 0; i <= 240; i++) {
        const H = -Hmax + (2 * Hmax * i) / 240;
        
        // 使用修复后的太阳位置计算函数
        const sunPos = getSunPosition(latitude, H * 180 / Math.PI, declination);
        const alt = sunPos.altDeg * Math.PI / 180;
        const azRad = sunPos.azRad;
        
        const r = 11;
        const cosAlt = Math.cos(alt);
        const x = r * Math.sin(azRad) * cosAlt;
        const y = r * Math.sin(alt);
        const z = -r * Math.cos(azRad) * cosAlt;
        pts.push(new THREE.Vector3(x, y, z));
      }
      const curve = new THREE.CatmullRomCurve3(pts);
      const curvePts = curve.getPoints(400);
      const above = [], below = [];
      curvePts.forEach(p => (p.y >= -0.05 ? above : below).push(p.clone()));
      if (above.length > 1) {
        const line = createFatLine(above, pathColorAbove.value, 0.55, false);
        pathGroup.add(line);
      }
      if (below.length > 1) {
        const belowLine = createFatLine(below, pathColorBelow.value, 0.35, true, 0.6, 0.6);
        pathGroup.add(belowLine);
      }
      
      pathGroup.visible = showOldPath;
      sunMarker.visible = showOldPath;

      if (showOldPath) {
        addTimeMarksToGroup(pathGroup, new THREE.Vector3(0, 0, 0));
      }
    }

    function getSunPosition(latDeg, haDeg, decDeg) {
      const phi = latDeg * Math.PI / 180;
      const H = haDeg * Math.PI / 180;
      const delta = decDeg * Math.PI / 180;
      
      // 处理极地情况（纬度接近90°）
      if (Math.abs(Math.cos(phi)) < 0.001) {
        // 在极地，太阳高度角等于赤纬（不考虑大气折射）
        const alt = delta;
        let sinAz, cosAz;
        
        if (latDeg >= 0) {
          // 北极：azRad = π + H（正午在南，6时在东，18时在西）
          sinAz = Math.sin(Math.PI + H);
          cosAz = Math.cos(Math.PI + H);
        } else {
          // 南极：azRad = -H（正午在北，6时在东，18时在西）
          sinAz = Math.sin(-H);
          cosAz = Math.cos(-H);
        }
        
        return { 
          altDeg: alt*180/Math.PI, 
          azRad: Math.atan2(sinAz, cosAz), 
          above: alt > -0.005 
        };
      }
      
      // 正常情况
      const sinAlt = Math.sin(phi)*Math.sin(delta) + Math.cos(phi)*Math.cos(delta)*Math.cos(H);
      const alt = Math.asin(Math.max(-1, Math.min(1, sinAlt)));
      const cosAlt = Math.cos(alt);
      let sinAz, cosAz;
      
      if (cosAlt < 0.001) {
        // 太阳在地平线附近
        sinAz = 0;
        cosAz = 1;
      } else {
        // 正常情况
        sinAz = -Math.cos(delta)*Math.sin(H)/cosAlt;
        cosAz = (Math.sin(delta)-Math.sin(phi)*Math.sin(alt))/(Math.cos(phi)*cosAlt);
      }
      
      return { altDeg: alt*180/Math.PI, azRad: Math.atan2(sinAz, cosAz), above: alt > -0.005 };
    }

    function calculateSunriseHourAngle() {
      const phi = latitude * Math.PI / 180;
      const delta = declination * Math.PI / 180;
      const cosH0 = -Math.tan(phi) * Math.tan(delta);
      if (cosH0 < -1) return null;
      if (cosH0 > 1) return null;
      return Math.acos(cosH0) * 180 / Math.PI;
    }

    function updateAxisTilt() {
      axisPivot.rotation.x = (latitude - 90) * Math.PI / 180;
    }

    function updateSunAndLight() {
      const sunData = getSunPosition(latitude, hourAngle, declination);
      const altDeg = sunData.altDeg;
      const azRad = sunData.azRad;
      const above = sunData.above;
      
      const cosAlt = Math.cos(altDeg * Math.PI/180);
      const sx = Math.sin(azRad) * cosAlt;
      const sy = Math.sin(altDeg * Math.PI/180);
      const sz = -Math.cos(azRad) * cosAlt;
      
      const dir = new THREE.Vector3(sx, sy, sz);
      
      // 晷盘中心位置
      const sundialCenter = new THREE.Vector3(0, baseHeight + axisHeight, 0);
      
      // 太阳可视化和光源以晷盘中心为圆心
      sunVis.position.copy(sundialCenter.clone().add(dir.clone().multiplyScalar(34)));
      sunLight.position.copy(sundialCenter.clone().add(dir.clone().multiplyScalar(28)));
      sunLight.target.position.copy(sundialCenter); // 光源也看向晷盘中心
      
      // 更新太阳标记点位置（在轨迹上）- 保持不变
      const r = 11; // 轨迹半径
      const markerPos = new THREE.Vector3(
        r * sx,
        r * sy,
        r * sz
      );
      sunMarker.position.copy(markerPos);
      
      // 更新北极星位置（北极星高度等于观测纬度）
      if (polaris && polarisLabel) {
        const absLatRad = Math.abs(latitude) * Math.PI / 180;
        const polarisR = 25;
        if (latitude >= 0) {
          // 北半球，北极星在北方
          polaris.visible = true;
          polarisLabel.visible = true;
          const px = 0;
          const py = polarisR * Math.sin(absLatRad);
          const pz = -polarisR * Math.cos(absLatRad);
          polaris.position.set(px, py, pz);
          polarisLabel.position.set(px, py + 1, pz);
        } else {
          // 南半球，北极星在南方地平线以下，不显示
          polaris.visible = false;
          polarisLabel.visible = false;
        }
      }

      // 加大光强差，让夜间更暗，白天更亮
      const brightness = Math.max(0.02, Math.min(1, altDeg/20));
      sunSphere.material.color.setRGB(1, 0.88*brightness+0.08, 0.45*brightness+0.04);
      
      // 地面阻挡阳光逻辑
      let finalIntensity = 10.0 * Math.max(0.1, brightness);
      if (showGroundShadow && !above) {
        // 如果开启地面挡光且太阳在地平线以下，完全阻挡阳光
        finalIntensity = 0;
      }
      sunLight.intensity = finalIntensity;

      if (above) {
        altSpan.textContent = altDeg.toFixed(1)+'°';
        let azDeg = azRad * 180/Math.PI;
        if (azDeg < 0) azDeg += 360;
        azSpan.textContent = azDeg.toFixed(1)+'°';
      } else {
        altSpan.textContent = '地平线下';
        azSpan.textContent = '—';
      }

      const solarTime = 12 + hourAngle/15;
      let hours = Math.floor(solarTime);
      const minutes = Math.round((solarTime-hours)*60);
      hours = ((hours%24)+24)%24;
      timeDisplay.textContent = `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')} 太阳时`;

      // 更新太阳信息标签
      if (sunInfoLabel) {
        scene.remove(sunInfoLabel);
        sunInfoLabel = null;
      }
      if (sunTimeMode !== 'free' && above) {
        let azDeg = azRad * 180/Math.PI;
        if (azDeg < 0) azDeg += 360;
        let modeText = '';
        if (sunTimeMode === 'sunrise') modeText = '日出';
        else if (sunTimeMode === 'sunset') modeText = '日落';
        else if (sunTimeMode === 'noon') modeText = '正午';
        const infoText = modeText + ' ' + String(hours).padStart(2,'0') + ':' + String(minutes).padStart(2,'0') + ' 方位' + azDeg.toFixed(1) + '°';
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffee88';
        ctx.font = 'bold 32px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(infoText, 256, 32);
        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.9, depthTest: false, depthWrite: false });
        sunInfoLabel = new THREE.Sprite(mat);
        const labelPos = showNewPath ? newSunBall.position.clone() : markerPos.clone();
        sunInfoLabel.position.copy(labelPos);
        sunInfoLabel.position.y += 0.8;
        sunInfoLabel.scale.set(4, 0.5, 1);
        sunInfoLabel.renderOrder = 999;
        scene.add(sunInfoLabel);
      }
    }

    function updateVisibility() {
      sundialGroup.visible = (displayMode==='sundial'||displayMode==='both');
      poleGroup.visible = (displayMode==='pole'||displayMode==='both');
      if (displayMode==='pole') {
        labelSprite.visible=false; poleLabelSprite.visible=true;
        poleGroup.position.set(0, 0, 0);
      } else if (displayMode==='sundial') {
        labelSprite.visible=true; poleLabelSprite.visible=false;
        poleGroup.position.set(5.5, 0, 0);
      } else {
        labelSprite.visible=true; poleLabelSprite.visible=true;
        poleGroup.position.set(5.5, 0, 0);
      }
    }

    function refreshAll() {
      updateAxisTilt();
      updateSunAndLight();
      updateSunPath();
      updateNewSunPath();
      updateVirtualGround();
      updateVisibility();
      updateSunPoint();
      updateSunArrow();
      if (latitude >= 0) {
        latSpan.textContent = latitude.toFixed(1)+'°N';
      } else {
        latSpan.textContent = Math.abs(latitude).toFixed(1)+'°S';
      }
      haSpan.textContent = hourAngle.toFixed(1)+'°';
      decSpan.textContent = declination.toFixed(1)+'°';
      pillarSpan.textContent = pillarLength.toFixed(1);
      globeOpacitySpan.textContent = globeOpacity.toFixed(2);
      createPillar(); // 更新晷针长度
    }
    
    function updateGlobeOpacity() {
      if (globeMaterial) {
        globeMaterial.opacity = globeOpacity;
        globeMaterial.needsUpdate = true;
      }
      globeOpacitySpan.textContent = globeOpacity.toFixed(2);
    }

    function goToSunrise() {
      const haRise = calculateSunriseHourAngle();
      if (haRise !== null) {
        hourAngle = -haRise;
        sliderHA.value = hourAngle;
        autoPlay = false;
        btnAutoPlay.textContent = '▶ 自动播放';
        btnAutoPlay.classList.remove('active');
        refreshAll();
      }
    }

    function goToSunset() {
      const haSet = calculateSunriseHourAngle();
      if (haSet !== null) {
        hourAngle = haSet;
        sliderHA.value = hourAngle;
        autoPlay = false;
        btnAutoPlay.textContent = '▶ 自动播放';
        btnAutoPlay.classList.remove('active');
        refreshAll();
      }
    }

    sliderLat.addEventListener('input', ()=>{ latitude=+sliderLat.value; if (sunTimeMode !== 'free') applySunTimeMode(); else refreshAll(); });
    sliderHA.addEventListener('input', ()=>{ hourAngle=+sliderHA.value; sunTimeMode='free'; btnSunrise.classList.remove('active'); btnNoon.classList.remove('active'); btnSunset.classList.remove('active'); refreshAll(); });
    sliderDec.addEventListener('input', ()=>{ declination=+sliderDec.value; if (sunTimeMode !== 'free') applySunTimeMode(); else refreshAll(); });
    sliderPillar.addEventListener('input', ()=>{ pillarLength=+sliderPillar.value; refreshAll(); });
    sliderGlobeOpacity.addEventListener('input', ()=>{ 
      globeOpacity = +sliderGlobeOpacity.value;
      updateGlobeOpacity();
    });

    pathColorAbove.addEventListener('input', ()=>{ updateSunPath(); updateNewSunPath(); });
    pathColorBelow.addEventListener('input', ()=>{ updateSunPath(); updateNewSunPath(); });
    sliderPathWidth.addEventListener('input', ()=>{ pathWidth = +sliderPathWidth.value; pathWidthVal.textContent = pathWidth; updateSunPath(); updateNewSunPath(); });

    btnBoth.addEventListener('click', ()=>{ displayMode='both'; refreshAll(); setActiveBtn(); });
    btnSundial.addEventListener('click', ()=>{ displayMode='sundial'; refreshAll(); setActiveBtn(); });
    btnPole.addEventListener('click', ()=>{ displayMode='pole'; refreshAll(); setActiveBtn(); });

    function setActiveBtn() {
      btnBoth.classList.toggle('active', displayMode==='both');
      btnSundial.classList.toggle('active', displayMode==='sundial');
      btnPole.classList.toggle('active', displayMode==='pole');
    }

    btnAutoPlay.addEventListener('click', ()=>{
      autoPlay=!autoPlay;
      btnAutoPlay.textContent = autoPlay?'⏸ 停止':'▶ 自动播放';
      btnAutoPlay.classList.toggle('active', autoPlay);
      if (autoPlay) {
        autoDir = 1;
        sunTimeMode = 'free';
        btnSunrise.classList.remove('active');
        btnNoon.classList.remove('active');
        btnSunset.classList.remove('active');
        if (showGlobeRotate) {
          showGlobeRotate = false;
          btnGlobeRotate.classList.remove('active');
        }
      }
    });

    btnGlobe.addEventListener('click', ()=>{
      if (!showGlobe) {
        // 开启地球仪时，恢复之前的状态
        showGlobeTexture = prevGlobeTextureState;
        showSunPoint = prevSunPointState;
        showGlobeRotate = prevGlobeRotateState;
        showSunArrow = prevSunArrowState;
        
        // 更新按钮状态
        btnGlobeTexture.classList.toggle('active', showGlobeTexture);
        btnSunPoint.classList.toggle('active', showSunPoint);
        btnGlobeRotate.classList.toggle('active', showGlobeRotate);
        btnSunArrow.classList.toggle('active', showSunArrow);
      } else {
        // 关闭地球仪时，保存当前状态
        prevGlobeTextureState = showGlobeTexture;
        prevSunPointState = showSunPoint;
        prevGlobeRotateState = showGlobeRotate;
        prevSunArrowState = showSunArrow;
        
        // 自动关闭相关功能
        showGlobeTexture = false;
        showSunPoint = false;
        showGlobeRotate = false;
        showSunArrow = false;
        
        // 更新按钮状态
        btnGlobeTexture.classList.remove('active');
        btnSunPoint.classList.remove('active');
        btnGlobeRotate.classList.remove('active');
        btnSunArrow.classList.remove('active');
      }
      
      showGlobe=!showGlobe;
      btnGlobe.classList.toggle('active', showGlobe);
      updateGlobeVisibility();
      updateGlobeTexture();
      updateSunPoint();
      updateSunArrow();
    });

    btnGlobeTexture.addEventListener('click', ()=>{
      showGlobeTexture=!showGlobeTexture;
      btnGlobeTexture.classList.toggle('active', showGlobeTexture);
      updateGlobeTexture();
    });

    btnGlobeRotate.addEventListener('click', ()=>{
      showGlobeRotate=!showGlobeRotate;
      btnGlobeRotate.classList.toggle('active', showGlobeRotate);
      // 如果自动播放开启，则关闭它
      if (showGlobeRotate && autoPlay) {
        autoPlay = false;
        btnAutoPlay.textContent = '▶ 自动播放';
        btnAutoPlay.classList.remove('active');
      }
    });

    btnSunPoint.addEventListener('click', ()=>{
      showSunPoint=!showSunPoint;
      btnSunPoint.classList.toggle('active', showSunPoint);
      updateGlobeVisibility();
      updateSunPoint();
      updateSunArrow();
    });

    btnSunArrow.addEventListener('click', ()=>{
      showSunArrow=!showSunArrow;
      btnSunArrow.classList.toggle('active', showSunArrow);
      if (showSunArrow) {
        if (!showGlobe) {
          showGlobe = true;
          btnGlobe.classList.add('active');
          updateGlobeVisibility();
          updateGlobeTexture();
        }
        if (!showSunPoint) {
          showSunPoint = true;
          btnSunPoint.classList.add('active');
          updateGlobeVisibility();
        }
        if (!showNewPath) {
          showNewPath = true;
          showOldPath = false;
          btnNewPath.classList.add('active');
          btnOldPath.classList.remove('active');
          updateSunPath();
          updateNewSunPath();
          updateVirtualGround();
        }
      }
      updateSunPoint();
      updateSunArrow();
    });

    btnGroundShadow.addEventListener('click', ()=>{
      showGroundShadow=!showGroundShadow;
      btnGroundShadow.classList.toggle('active', showGroundShadow);
      updateGroundShadow();
    });

    btnTimeMarks.addEventListener('click', ()=>{
      showTimeMarks=!showTimeMarks;
      btnTimeMarks.classList.toggle('active', showTimeMarks);
      updateSunPath();
      updateNewSunPath();
    });

    btnOldPath.addEventListener('click', ()=>{
      if (showOldPath) return;
      showOldPath = true;
      showNewPath = false;
      btnOldPath.classList.add('active');
      btnNewPath.classList.remove('active');
      updateSunPath();
      updateNewSunPath();
      updateSunArrow();
      updateVirtualGround();
    });

    btnNewPath.addEventListener('click', ()=>{
      if (showNewPath) return;
      showNewPath = true;
      showOldPath = false;
      btnNewPath.classList.add('active');
      btnOldPath.classList.remove('active');
      updateSunPath();
      updateNewSunPath();
      updateSunArrow();
      updateVirtualGround();
    });
    
    function updateGroundShadow() {
      updateSunAndLight();
    }

    function applySunTimeMode() {
      if (sunTimeMode === 'noon') {
        hourAngle = 0;
      } else if (sunTimeMode === 'sunrise') {
        const haRise = calculateSunriseHourAngle();
        if (haRise !== null) hourAngle = -haRise;
      } else if (sunTimeMode === 'sunset') {
        const haSet = calculateSunriseHourAngle();
        if (haSet !== null) hourAngle = haSet;
      }
      sliderHA.value = hourAngle;
      refreshAll();
    }

    btnNoon.addEventListener('click', ()=>{
      if (sunTimeMode === 'noon') {
        sunTimeMode = 'free';
        btnNoon.classList.remove('active');
      } else {
        sunTimeMode = 'noon';
        btnNoon.classList.add('active');
        btnSunrise.classList.remove('active');
        btnSunset.classList.remove('active');
        autoPlay = false;
        btnAutoPlay.textContent = '▶ 自动播放';
        btnAutoPlay.classList.remove('active');
      }
      applySunTimeMode();
    });

    btnSunrise.addEventListener('click', ()=>{
      if (sunTimeMode === 'sunrise') {
        sunTimeMode = 'free';
        btnSunrise.classList.remove('active');
      } else {
        sunTimeMode = 'sunrise';
        btnSunrise.classList.add('active');
        btnNoon.classList.remove('active');
        btnSunset.classList.remove('active');
        autoPlay = false;
        btnAutoPlay.textContent = '▶ 自动播放';
        btnAutoPlay.classList.remove('active');
      }
      applySunTimeMode();
    });

    btnSunset.addEventListener('click', ()=>{
      if (sunTimeMode === 'sunset') {
        sunTimeMode = 'free';
        btnSunset.classList.remove('active');
      } else {
        sunTimeMode = 'sunset';
        btnSunset.classList.add('active');
        btnNoon.classList.remove('active');
        btnSunrise.classList.remove('active');
        autoPlay = false;
        btnAutoPlay.textContent = '▶ 自动播放';
        btnAutoPlay.classList.remove('active');
      }
      applySunTimeMode();
    });

    toggleBtn.addEventListener('click', ()=>{
      panel.classList.toggle('collapsed');
      toggleBtn.classList.toggle('shifted');
      toggleBtn.textContent = panel.classList.contains('collapsed')?'⚙':'☰';
    });

    window.addEventListener('keydown', (e)=>{
      switch(e.key.toLowerCase()) {
        case ' ': e.preventDefault(); autoPlay=!autoPlay; btnAutoPlay.textContent=autoPlay?'⏸ 停止':'▶ 自动播放'; btnAutoPlay.classList.toggle('active', autoPlay); if(autoPlay){autoDir=1; sunTimeMode='free'; btnSunrise.classList.remove('active'); btnNoon.classList.remove('active'); btnSunset.classList.remove('active');} break;
        case 'n': btnNoon.click(); break;
        case 'r': btnSunrise.click(); break;
        case 's': btnSunset.click(); break;
        case '1': displayMode='both'; refreshAll(); setActiveBtn(); break;
        case '2': displayMode='sundial'; refreshAll(); setActiveBtn(); break;
        case '3': displayMode='pole'; refreshAll(); setActiveBtn(); break;
        case 'arrowleft': hourAngle=Math.max(-180, hourAngle-10); sliderHA.value=hourAngle; sunTimeMode='free'; btnSunrise.classList.remove('active'); btnNoon.classList.remove('active'); btnSunset.classList.remove('active'); refreshAll(); break;
        case 'arrowright': hourAngle=Math.min(180, hourAngle+10); sliderHA.value=hourAngle; sunTimeMode='free'; btnSunrise.classList.remove('active'); btnNoon.classList.remove('active'); btnSunset.classList.remove('active'); refreshAll(); break;
        case 'arrowup': latitude=Math.min(90, latitude+2); sliderLat.value=latitude; if(sunTimeMode!=='free') applySunTimeMode(); else refreshAll(); break;
        case 'arrowdown': latitude=Math.max(-90, latitude-2); sliderLat.value=latitude; if(sunTimeMode!=='free') applySunTimeMode(); else refreshAll(); break;
      }
    });

    window.addEventListener('resize', ()=>{
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateSunPath();
      updateNewSunPath();
    });

    sliderLat.value=latitude; sliderHA.value=hourAngle; sliderDec.value=declination; sliderPillar.value=pillarLength;
    btnOldPath.classList.add('active');
    toggleBtn.classList.add('shifted');
    refreshAll();

    function animate() {
      requestAnimationFrame(animate);
      if (autoPlay && sunTimeMode === 'free') {
        hourAngle += autoSpeed * autoDir;
        if (hourAngle >= 180) {
          hourAngle = -180;
        }
        sliderHA.value = hourAngle;
        refreshAll();
      }
      // 地球仪自转动画
      if (showGlobeRotate && showGlobe && globeRotateGroup) {
        globeRotationAngle += 0.2;
        if (globeRotationAngle >= 360) {
          globeRotationAngle = 0;
        }
        // 旋转地球仪的球面部分和太阳直射点（不旋转经线纬线和地轴）
        globeRotateGroup.rotation.y = globeRotationAngle * Math.PI / 180;
      }
      controls.update();
      sunVis.children.forEach(c=>{ if(c.isMesh && c.material?.isMeshBasicMaterial && c.material.transparent) c.lookAt(camera.position); });
      renderer.render(scene, camera);
    }
    requestAnimationFrame(animate);
    console.log('✅ 高度降低20%，日出日落按钮就位');
  </script>
</body>
</html>
